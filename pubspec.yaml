name: codelens_ar
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  ar_flutter_plugin: ^0.7.3
  vector_math: ^2.1.4
  http: ^1.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# ar_flutter_plugin transitively pulls in an old permission_handler version
# (10.x) that still references Flutter's removed v1 plugin embedding
# (PluginRegistry.Registrar), which no longer exists in modern Flutter.
# We override it here to force a modern, v2-embedding-only version.
dependency_overrides:
  permission_handler: ^12.0.3

flutter:
  uses-material-design: true
  assets:                      # ✅ DOĞRU - flutter: bloğunun içinde, 2 boşluk girintili
    - assets/models/box_function.glb
    - assets/models/box_class.glb
    - assets/models/box_component.glb
    - assets/models/box_module.glb
